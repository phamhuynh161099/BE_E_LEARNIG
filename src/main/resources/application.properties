# ── Spring Application ──
spring.application.name=boilerplate


# ── Tắt auto-config datasource mặc định ──
# Vì chúng ta tự config nhiều datasource thủ công
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration,\
  org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration

# ── Redis ──
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASS:}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.min-idle=2

# ── Datasource 1: MySQL (primary) ──
# datasource.primary.jdbc-url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:rbac_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
datasource.primary.jdbc-url=jdbc:mysql://103.155.161.244:3306/BoilerplateDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

datasource.primary.username=${MYSQL_USER:dbeaver_user}
datasource.primary.password=${MYSQL_PASS:password123}
datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver
datasource.primary.hikari.pool-name=HikariMySQL
datasource.primary.hikari.maximum-pool-size=10
datasource.primary.hikari.minimum-idle=2
datasource.primary.hikari.connection-timeout=30000

# ── Datasource 2: MySQL (audit) ──
datasource.audit.jdbc-url=jdbc:mysql://103.155.161.244:3306/AuditLogDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

datasource.audit.username=${MYSQL_USER:dbeaver_user}
datasource.audit.password=${MYSQL_PASS:password123}
datasource.audit.driver-class-name=com.mysql.cj.jdbc.Driver
datasource.audit.hikari.pool-name=Hikari2MySQL
datasource.audit.hikari.maximum-pool-size=10
datasource.audit.hikari.minimum-idle=2
datasource.audit.hikari.connection-timeout=30000

# ── App config ──
app.jwt.secret=${APP_JWT_SECRET:rbac-super-secret-key-must-be-at-least-32-chars!!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:3000}
app.cache.permission-ttl-seconds=300
app.cache.token-blacklist-ttl-seconds=86400

# ── Logging ──
logging.level.com.example.rbac.mapper=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# --- Upload ---
video.storage.original=./uploads/original
video.storage.encoded=./uploads/encoded

# --- Upload Config ---
spring.servlet.multipart.max-file-size=5000MB
spring.servlet.multipart.max-request-size=5000MB


